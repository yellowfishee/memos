name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            cd /opt/memos

            # Pull latest code
            git pull origin main

            # Build frontend
            cd web
            pnpm install --frozen-lockfile
            pnpm release

            # Build Go binary
            cd ..
            go build -trimpath -ldflags="-s -w" -o memos ./cmd/memos

            # Stop old process
            pkill -f "./memos" || true
            sleep 2

            # Start new process
            nohup ./memos --port 5230 > memos.log 2>&1 &
            echo "Started memos"
            sleep 3
            tail -20 memos.log